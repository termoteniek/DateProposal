<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voor Eline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-glow bg-glow--left" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--right" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <main class="card">
    <section id="step-intro" class="step step-intro">
      <div class="step-ornament" aria-hidden="true"></div>
      <svg class="horse-mark" viewBox="0 0 120 80" aria-hidden="true">
        <path d="M95 55c8-12 6-28-4-36-6-5-14-6-22-4-3 8-10 14-20 16-8 2-15 0-20-6-2 12 2 24 12 32 8 6 18 8 28 6 4-2 8-5 12-8 6 4 12 6 18 4z" fill="currentColor"/>
        <path d="M18 48c-2-8 0-16 6-22M30 26c4-6 12-10 20-10M72 18c10 0 18 6 22 14M88 32c6 4 10 12 8 20" stroke="currentColor" stroke-width="1.5" fill="none"/>
      </svg>
      <h1>Hey Eline, ik heb nog een vraagje</h1>
      <button type="button" class="btn-ja" id="btn-ja">
        <span>Ja ?</span>
      </button>
    </section>

    <section id="step-question" class="step step-question hidden" hidden>
      <div class="step-ornament step-ornament--pasta" aria-hidden="true"></div>
      <blockquote class="question">
        Zou je graag op een date gaan met mij? Ik denk aan pasta gaan eten in een Italiaans restaurant,
        ergens gezellig.
      </blockquote>

      <!--
        E-mail instellen (eenmalig, gratis):
        1. Ga naar https://web3forms.com en vul JOUW e-mailadres in.
        2. Kopieer de access key die je krijgt.
        3. Vervang YOUR_ACCESS_KEY hieronder door die key.
      -->
      <form
        id="proposal-form"
        action="https://api.web3forms.com/submit"
        method="POST"
      >
        <input type="hidden" name="access_key" value="a3d58277-1017-4c04-91b7-72b83e09ab94">
        <input type="hidden" name="subject" id="form-subject" value="Eline — date voorstel">
        <input type="hidden" name="from_name" value="Eline — Date voorstel">
        <input type="hidden" name="message" id="form-message" value="">
        <input type="checkbox" name="botcheck" class="hidden" tabindex="-1" autocomplete="off">

        <fieldset class="choices">
          <legend class="sr-only">Jouw antwoord</legend>
          <label class="choice choice-yes">
            <input type="radio" name="antwoord" value="Ja" required>
            <span class="choice-face">Ja</span>
          </label>
          <label class="choice choice-no">
            <input type="radio" name="antwoord" value="Nee">
            <span class="choice-face">Nee</span>
          </label>
        </fieldset>

        <p id="form-status" class="form-status" role="status" aria-live="polite"></p>
      </form>
    </section>

    <section id="step-result-yes" class="step step-result step-result--yes hidden" hidden>
      <div class="confetti" aria-hidden="true"></div>
      <p class="result-emoji" aria-hidden="true">🎉</p>
      <h2 class="result-title">JIPPIEEE</h2>
      <p class="result-text">Ik kijk er zo naar uit!</p>
    </section>

    <section id="step-result-no" class="step step-result step-result--no hidden" hidden>
      <svg class="sad-face" viewBox="0 0 80 80" aria-hidden="true">
        <circle cx="40" cy="40" r="36" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="28" cy="32" r="4" fill="currentColor"/>
        <circle cx="52" cy="32" r="4" fill="currentColor"/>
        <path d="M26 54 Q40 44 54 54" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <h2 class="result-title result-title--sad">Jammer…</h2>
      <p class="result-text">Bedankt voor je eerlijkheid.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
